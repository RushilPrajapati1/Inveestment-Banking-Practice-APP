<svg xmlns="http://www.w3.org/2000/svg" width="393" height="852" viewBox="0 0 393 852" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif">
  <rect width="393" height="852" fill="#F2F2F7"/>

  <g font-size="15" font-weight="600" fill="#1C1C1E">
    <text x="32" y="38">9:41</text>
    <text x="320" y="38">5G 􀋂</text>
  </g>

  <!-- Large title -->
  <text x="20" y="116" font-size="28" font-weight="700" fill="#1C1C1E">Progress</text>

  <!-- Hero card -->
  <g>
    <rect x="20" y="138" width="353" height="156" rx="14" fill="#FFFFFF"/>

    <text x="36" y="172" font-size="17" font-weight="600" fill="#1C1C1E">42 known</text>
    <text x="357" y="172" font-size="17" font-weight="600" fill="#6B6B70" text-anchor="end">11%</text>

    <!-- Progress bar -->
    <rect x="36" y="186" width="321" height="6" rx="3" fill="#E4E4E9"/>
    <rect x="36" y="186" width="36" height="6" rx="3" fill="#287BEF"/>

    <!-- Stats -->
    <g>
      <text x="36" y="232" font-size="20" font-weight="600" fill="#34C759">42</text>
      <text x="36" y="254" font-size="12" fill="#6B6B70">Known</text>

      <text x="143" y="232" font-size="20" font-weight="600" fill="#FF9F0A">12</text>
      <text x="143" y="254" font-size="12" fill="#6B6B70">Review</text>

      <text x="250" y="232" font-size="20" font-weight="600" fill="#6B6B70">400</text>
      <text x="250" y="254" font-size="12" fill="#6B6B70">Total</text>
    </g>
  </g>

  <!-- Categories section -->
  <text x="36" y="320" font-size="12" font-weight="600" fill="#6B6B70" letter-spacing="0.5">CATEGORIES</text>

  <g>
    <rect x="20" y="330" width="353" height="320" rx="14" fill="#FFFFFF"/>

    <!-- Fit (expanded) -->
    <text x="36" y="360" font-size="17" font-weight="600" fill="#1C1C1E">▾  Fit</text>

    <text x="56" y="394" font-size="15" fill="#1C1C1E">Analytical / Attention to Detail</text>
    <text x="357" y="394" font-size="15" fill="#6B6B70" text-anchor="end">3/9</text>
    <rect x="56" y="402" width="301" height="4" rx="2" fill="#E4E4E9"/>
    <rect x="56" y="402" width="100" height="4" rx="2" fill="#287BEF"/>

    <text x="56" y="438" font-size="15" fill="#1C1C1E">Communication</text>
    <text x="357" y="438" font-size="15" fill="#6B6B70" text-anchor="end">1/8</text>
    <rect x="56" y="446" width="301" height="4" rx="2" fill="#E4E4E9"/>
    <rect x="56" y="446" width="38" height="4" rx="2" fill="#287BEF"/>

    <line x1="36" y1="478" x2="357" y2="478" stroke="#E4E4E9"/>

    <!-- Accounting (collapsed) -->
    <text x="36" y="506" font-size="17" font-weight="600" fill="#1C1C1E">▸  Accounting</text>
    <text x="357" y="506" font-size="15" fill="#6B6B70" text-anchor="end">7/24</text>
    <line x1="36" y1="528" x2="357" y2="528" stroke="#E4E4E9"/>

    <!-- Valuation (collapsed) -->
    <text x="36" y="556" font-size="17" font-weight="600" fill="#1C1C1E">▸  Valuation</text>
    <text x="357" y="556" font-size="15" fill="#6B6B70" text-anchor="end">12/68</text>
    <line x1="36" y1="578" x2="357" y2="578" stroke="#E4E4E9"/>

    <!-- DCF (collapsed) -->
    <text x="36" y="606" font-size="17" font-weight="600" fill="#1C1C1E">▸  DCF</text>
    <text x="357" y="606" font-size="15" fill="#6B6B70" text-anchor="end">8/22</text>
    <line x1="36" y1="628" x2="357" y2="628" stroke="#E4E4E9"/>

    <text x="36" y="650" font-size="15" fill="#6B6B70">…</text>
  </g>

  <!-- Reset button -->
  <g>
    <rect x="20" y="678" width="353" height="50" rx="14" fill="#FFFFFF"/>
    <text x="196.5" y="708" font-size="17" font-weight="600" fill="#FF3B30" text-anchor="middle">🗑   Reset progress</text>
  </g>

  <!-- Tab bar -->
  <g>
    <rect x="0" y="769" width="393" height="83" fill="#F8F8FA"/>
    <line x1="0" y1="769" x2="393" y2="769" stroke="#E4E4E9"/>
    <text x="65" y="800" font-size="22" text-anchor="middle" opacity="0.55">📚</text>
    <text x="65" y="822" font-size="10" fill="#6B6B70" text-anchor="middle">Browse</text>
    <text x="196" y="800" font-size="22" text-anchor="middle" opacity="0.55">🃏</text>
    <text x="196" y="822" font-size="10" fill="#6B6B70" text-anchor="middle">Flashcards</text>
    <text x="327" y="800" font-size="22" text-anchor="middle">📊</text>
    <text x="327" y="822" font-size="10" font-weight="600" fill="#287BEF" text-anchor="middle">Progress</text>
    <rect x="130" y="842" width="134" height="5" rx="2.5" fill="#1C1C1E"/>
  </g>
</svg>
