<svg xmlns="http://www.w3.org/2000/svg" width="393" height="852" viewBox="0 0 393 852" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif">
  <rect width="393" height="852" fill="#FFFFFF"/>

  <!-- Status bar -->
  <g font-size="15" font-weight="600" fill="#1C1C1E">
    <text x="32" y="38">9:41</text>
    <text x="320" y="38">5G 􀋂</text>
  </g>

  <!-- Nav bar -->
  <g>
    <rect x="0" y="59" width="393" height="56" fill="#F8F8FA"/>
    <text x="20" y="93" font-size="17" fill="#287BEF">‹ Back</text>
    <text x="196.5" y="93" font-size="17" font-weight="600" fill="#1C1C1E" text-anchor="middle">Question 12</text>
    <line x1="0" y1="115" x2="393" y2="115" stroke="#E4E4E9"/>
  </g>

  <!-- Meta row -->
  <g>
    <text x="20" y="148" font-size="12" font-weight="600" fill="#6B6B70" letter-spacing="0.5">INCOME STATEMENT</text>
    <rect x="201" y="135" width="44" height="18" rx="9" fill="#34C75926"/>
    <text x="223" y="148" font-size="11" font-weight="600" fill="#34C759" text-anchor="middle">BASIC</text>
  </g>

  <!-- Question title -->
  <g font-size="20" font-weight="600" fill="#1C1C1E">
    <text x="20" y="184">Walk me through the three</text>
    <text x="20" y="210">financial statements.</text>
  </g>
  <line x1="20" y1="232" x2="373" y2="232" stroke="#E4E4E9"/>

  <!-- Answer paragraph -->
  <g font-size="17" fill="#1C1C1E">
    <text x="20" y="262">The three major financial statements</text>
    <text x="20" y="285">are the Income Statement, Balance</text>
    <text x="20" y="308">Sheet, and Cash Flow Statement.</text>
  </g>

  <!-- Bullets -->
  <g font-size="17" fill="#1C1C1E">
    <text x="20" y="350">•</text>
    <text x="36" y="350">The Income Statement gives the</text>
    <text x="36" y="373">company's revenue and expenses,</text>
    <text x="36" y="396">and goes down to Net Income.</text>

    <text x="20" y="436">•</text>
    <text x="36" y="436">The Balance Sheet shows the</text>
    <text x="36" y="459">company's Assets — its resources —</text>
    <text x="36" y="482">and Liabilities + Equity.</text>

    <text x="20" y="522">•</text>
    <text x="36" y="522">The Cash Flow Statement begins</text>
    <text x="36" y="545">with Net Income, adjusts for non-</text>
    <text x="36" y="568">cash items, and shows actual cash.</text>
  </g>

  <!-- Bottom action bar -->
  <g>
    <rect x="0" y="691" width="393" height="78" fill="#F8F8FA"/>
    <line x1="0" y1="691" x2="393" y2="691" stroke="#E4E4E9"/>

    <!-- Review button (bordered, currently inactive) -->
    <rect x="16" y="709" width="172" height="44" rx="10" fill="#FFFFFF" stroke="#E4E4E9"/>
    <text x="102" y="737" font-size="15" font-weight="600" fill="#1C1C1E" text-anchor="middle">↺  Review</text>

    <!-- Known button (prominent, accent) -->
    <rect x="204" y="709" width="173" height="44" rx="10" fill="#287BEF"/>
    <text x="290.5" y="737" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">✓  Known</text>
  </g>

  <!-- Tab bar -->
  <g>
    <rect x="0" y="769" width="393" height="83" fill="#F8F8FA"/>
    <line x1="0" y1="769" x2="393" y2="769" stroke="#E4E4E9"/>
    <text x="65" y="800" font-size="22" text-anchor="middle">📚</text>
    <text x="65" y="822" font-size="10" font-weight="600" fill="#287BEF" text-anchor="middle">Browse</text>
    <text x="196" y="800" font-size="22" text-anchor="middle" opacity="0.55">🃏</text>
    <text x="196" y="822" font-size="10" fill="#6B6B70" text-anchor="middle">Flashcards</text>
    <text x="327" y="800" font-size="22" text-anchor="middle" opacity="0.55">📊</text>
    <text x="327" y="822" font-size="10" fill="#6B6B70" text-anchor="middle">Progress</text>
    <rect x="130" y="842" width="134" height="5" rx="2.5" fill="#1C1C1E"/>
  </g>
</svg>
